name: parking_app
description: A minimal Flutter frontend for parking management.
publish_to: 'none'

environment:
  sdk: '>=2.17.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.0
  qr_flutter: ^4.1.0
  http: ^1.2.0
  flutter_secure_storage: ^9.0.0
  logger: ^2.0.0
  file_picker: ^8.1.2
  web_socket_channel: ^3.0.3
  video_player: ^2.8.6
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.10.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.svg

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"



